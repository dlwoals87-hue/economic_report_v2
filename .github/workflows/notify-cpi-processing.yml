name: Notify CPI Processing

on:
  workflow_run:
    workflows:
      - "Process CPI Release"
    types:
      - completed

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  notify:
    if: >-
      github.event.workflow_run.name == 'Process CPI Release' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Prepare notification payload
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_RUN_JSON: ${{ toJson(github.event.workflow_run) }}
        run: |
          if [ "$CONCLUSION" = "success" ]; then
            artifact_id="$(gh api "/repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts" --jq '.artifacts[] | select(.name == "cpi-notification-event") | .id' | head -n 1)"
            [ -n "$artifact_id" ] || exit 0
            gh api "/repos/${{ github.repository }}/actions/artifacts/$artifact_id/zip" > "$RUNNER_TEMP/cpi-notification.zip"
            unzip -p "$RUNNER_TEMP/cpi-notification.zip" notification_event.json > "$RUNNER_TEMP/notification_event.json"
          else
            printf '%s' "$WORKFLOW_RUN_JSON" > "$RUNNER_TEMP/workflow_run.json"
          fi

      - name: Create deduplicated CPI Issue
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "$CONCLUSION" = "success" ]; then
            [ -f "$RUNNER_TEMP/notification_event.json" ] || exit 0
            python scripts/automation/manage_cpi_github_notification.py \
              --repository "$REPOSITORY" \
              --payload "$RUNNER_TEMP/notification_event.json" \
              --apply
          else
            python scripts/automation/manage_cpi_github_notification.py \
              --repository "$REPOSITORY" \
              --workflow-run-json "$RUNNER_TEMP/workflow_run.json" \
              --apply
          fi
