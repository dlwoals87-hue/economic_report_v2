name: Notify PPI Processing
on:
  workflow_dispatch:
  workflow_run:
    workflows: [Process PPI Release]
    types: [completed]
permissions:
  actions: read
  contents: read
  issues: write
concurrency:
  group: notify-ppi-processing
  cancel-in-progress: false
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ppi-processing-result
          path: upstream
      - run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from scripts.automation.build_ppi_notification import build_notification
          path=Path('upstream/ppi-processing-result.json')
          result=json.loads(path.read_text()) if path.is_file() else {'status':'ARTIFACT_MISSING'}
          Path('ppi-notification-result.json').write_text(json.dumps(build_notification(result),indent=2)+'\n')
          PY
      - uses: actions/github-script@v7
        if: ${{ hashFiles('ppi-notification-result.json') != '' }}
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('ppi-notification-result.json', 'utf8'));
            if (result.status !== 'NOTIFICATION_READY') return;
            const marker = `<!-- automation-key: ${result.dedupe_key} -->`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {owner: context.repo.owner, repo: context.repo.repo, state: 'all'});
            const matches = issues.filter(issue => (issue.body || '').includes(marker));
            if (matches.length > 1) core.setFailed('DUPLICATE_ISSUE_CONFLICT');
            else if (matches.length === 0) await github.rest.issues.create({owner: context.repo.owner, repo: context.repo.repo, title: result.title, body: `${marker}\n${result.body}`, labels: result.labels});
            else await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: matches[0].number, title: result.title, body: `${marker}\n${result.body}`});
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ppi-notification-result
          path: ppi-notification-result.json
