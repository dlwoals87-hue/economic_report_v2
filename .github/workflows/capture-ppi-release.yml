name: Capture PPI Release

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

concurrency:
  group: capture-ppi-release
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run calendar-gated PPI capture
        run: python scripts/automation/run_due_ppi_capture.py --enable-live-bls --result-json ppi-capture-result.json
      - name: Validate result and stage captured release only
        id: result
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path, PurePosixPath
          result = json.loads(Path('ppi-capture-result.json').read_text(encoding='utf-8'))
          status = result['status']
          paths = result.get('commit_paths') or []
          captured = status == 'CAPTURED'
          if captured:
              if len(paths) != 1:
                  raise SystemExit('CAPTURED requires exactly one commit path')
              path = paths[0]
              pure = PurePosixPath(path)
              event_id = result.get('event_id')
              expected = f'data/releases/ppi/{event_id}/as_released.json'
              if pure.is_absolute() or '..' in pure.parts or path != expected:
                  raise SystemExit('unsafe PPI release path')
              target = Path(path)
              if not target.is_file() or target.is_symlink():
                  raise SystemExit('missing or symlink PPI release')
              payload = json.loads(target.read_text(encoding='utf-8'))
              if not payload.get('integrity', {}).get('sha256'):
                  raise SystemExit('PPI release integrity missing')
              with Path(os.environ['GITHUB_OUTPUT']).open('a', encoding='utf-8') as output:
                  output.write(f'commit_path={path}\n')
          elif paths:
              raise SystemExit('no-op result must not contain commit paths')
          with Path(os.environ['GITHUB_OUTPUT']).open('a', encoding='utf-8') as output:
              output.write(f'captured={str(captured).lower()}\n')
          PY
      - name: Commit captured PPI release
        if: steps.result.outputs.captured == 'true'
        env:
          COMMIT_PATH: ${{ steps.result.outputs.commit_path }}
          STAGED_PATHS_FILE: ${{ runner.temp }}/ppi_staged_paths.txt
          STAGED_STATUS_FILE: ${{ runner.temp }}/ppi_staged_status.txt
        run: |
          git add -- "$COMMIT_PATH"
          git diff --cached --name-only > "$STAGED_PATHS_FILE"
          git diff --cached --name-status > "$STAGED_STATUS_FILE"
          python - <<'PY'
          import os
          from pathlib import Path, PurePosixPath

          expected = os.environ["COMMIT_PATH"]
          staged = [
              line.strip()
              for line in Path(os.environ["STAGED_PATHS_FILE"]).read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          statuses = [
              line.strip().split("\t", 1)
              for line in Path(os.environ["STAGED_STATUS_FILE"]).read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          pure = PurePosixPath(expected)

          if pure.is_absolute() or ".." in pure.parts or "\\" in expected:
              raise SystemExit("unsafe expected PPI release path")
          if len(staged) != 1 or len(set(staged)) != 1:
              raise SystemExit("exactly one unique PPI release path must be staged")
          if staged != [expected]:
              raise SystemExit("staged paths do not match commit path")
          if len(statuses) != 1 or statuses[0] != ["A", expected]:
              raise SystemExit("PPI release must be staged as a new file")
          path = Path(expected)
          if not path.is_file() or path.is_symlink():
              raise SystemExit("staged PPI release is not a regular file")
          if len(pure.parts) != 5 or pure.parts[:3] != ("data", "releases", "ppi") or pure.parts[-1] != "as_released.json":
              raise SystemExit("unexpected PPI release path")
          PY
          git commit -m "Capture PPI release"
          git push
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ppi-capture-result
          path: ppi-capture-result.json
          if-no-files-found: warn
